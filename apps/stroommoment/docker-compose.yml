services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      STROOMMOMENT_CACHE_DIR: /app/.cache
      STROOMMOMENT_CORS_ORIGINS: ${STROOMMOMENT_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,https://poc.coolsnet.com}
    volumes:
      - ${STROOMMOMENT_CACHE_HOST_PATH:-./backend/.cache}:/app/.cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  router:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${STROOMMOMENT_HTTP_PORT:-8080}:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
